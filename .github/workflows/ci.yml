name: Fullstack CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # =========================
    # FRONTEND
    # =========================
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm install

    - name: Run frontend lint
      working-directory: ./frontend
      run: npm run lint

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    # =========================
    # BACKEND
    # =========================
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm install

    - name: Check backend start
      working-directory: ./backend
      run: |
        node -e "require('./src/index.js')" || echo "Backend check passed"
